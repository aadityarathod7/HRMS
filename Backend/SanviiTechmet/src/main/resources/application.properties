spring.application.name=SanviiTechmet
server.port=5000

# PostgreSQL Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/SanviiTech_HRMS
spring.datasource.username=postgres
spring.datasource.password=root

# OAuth2 Configuration (Google OAuth2 Login Example)
spring.security.oauth2.client.registration.google.client-id=968620113133-cn4ccu7fhso7tson5kpg5pfr53qn1b8v.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:5000/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
